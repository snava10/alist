name: e2e-test-android

on:
  pull_request:
    branches: ['*']

jobs:
  fingerprint:
    type: fingerprint
    environment: preview

  get_existing_build:
    needs: [fingerprint]
    type: get-build
    params:
      platform: android
      profile: e2e-test
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}

  build_android_for_e2e:
    needs: [get_existing_build]
    if: ${{ !needs.get_existing_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: e2e-test

  maestro_test:
    needs: [get_existing_build]
    after: [build_android_for_e2e]
    type: maestro
    params:
      build_id: ${{ needs.get_existing_build.outputs.build_id || after.build_android_for_e2e.outputs.build_id }}
      flow_path:
        - '.maestro/login_anonymous.yml'
        - '.maestro/home_add_item.yml'
        - '.maestro/navigate_to_profile.yml'
