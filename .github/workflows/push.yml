name: On Push Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  pull-requests: write

# ─────────────────────────────────────────────────────────────
# Phase 1 — Fast checks (1–2 min): TypeScript, ESLint, Unit tests
# Phase 2 — Deep checks (5–10 min): Mutation testing, Static analysis, Contract tests
# Phase 3 — Real user simulation: Maestro E2E tests
# Only if all 3 phases pass → merge allowed.
# ─────────────────────────────────────────────────────────────

jobs:
  # ── Phase 1: Fast checks ──────────────────────────────────

  type-check:
    name: "TypeCheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}
      - run: npm run type-check

  lint:
    name: "ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}
      - run: npm run lint

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Run tests
        run: npm test -- --coverage --watchAll=false --coverageReporters=json-summary --coverageReporters=lcov

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/jest-coverage-comment@main
        with:
          coverage-summary-path: ./coverage/coverage-summary.json
          title: Code Coverage

  # ── Phase 2: Deep checks (gated on Phase 1) ──────────────

  mutation-test:
    name: "Mutation Testing"
    runs-on: ubuntu-latest
    needs: [type-check, lint, unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Run mutation tests
        run: npm run test:mutate -- --reporters clear-text,json
        env:
          CI: true

      - name: Post mutation report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('reports/mutation/mutation.json', 'utf8'));
            const { metrics } = report.schemaVersion ? report : { metrics: {} };

            // Build summary from JSON report
            const score = (report.files
              ? Object.values(report.files).reduce((acc, f) => acc + f.mutants.filter(m => m.status === 'Killed').length, 0) /
                Math.max(1, Object.values(report.files).reduce((acc, f) => acc + f.mutants.filter(m => ['Killed','Survived','Timeout','NoCoverage'].includes(m.status)).length, 0)) * 100
              : 0).toFixed(2);

            const totalMutants = report.files
              ? Object.values(report.files).reduce((acc, f) => acc + f.mutants.length, 0)
              : 0;
            const killed = report.files
              ? Object.values(report.files).reduce((acc, f) => acc + f.mutants.filter(m => m.status === 'Killed').length, 0)
              : 0;
            const survived = report.files
              ? Object.values(report.files).reduce((acc, f) => acc + f.mutants.filter(m => m.status === 'Survived').length, 0)
              : 0;
            const noCoverage = report.files
              ? Object.values(report.files).reduce((acc, f) => acc + f.mutants.filter(m => m.status === 'NoCoverage').length, 0)
              : 0;

            const body = `## 🧬 Mutation Testing Report\n\n` +
              `| Metric | Value |\n|---|---|\n` +
              `| **Mutation Score** | ${score}% |\n` +
              `| **Total Mutants** | ${totalMutants} |\n` +
              `| **Killed** | ${killed} |\n` +
              `| **Survived** | ${survived} |\n` +
              `| **No Coverage** | ${noCoverage} |\n`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Mutation Testing Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  static-analysis:
    name: "Architecture (dependency-cruiser)"
    runs-on: ubuntu-latest
    needs: [type-check, lint, unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}
      - name: Run dependency-cruiser
        run: npm run deps:check

  contract-tests:
    name: "Contract Tests"
    runs-on: ubuntu-latest
    needs: [type-check, lint, unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}
      - name: Run contract tests
        run: npm run test:contracts -- --watchAll=false

  # ── Phase 3: Real user simulation (gated on Phase 2) ─────

  e2e-test:
    name: "E2E Tests (Maestro)"
    runs-on: ubuntu-latest
    needs: [mutation-test, static-analysis, contract-tests]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}
      - name: Run E2E tests on EAS
        run: npx eas-cli@latest workflow:run .eas/workflows/e2e-test-android.yml --non-interactive

  # ── Build (only on master, after all phases pass) ─────────

  android-build:
    name: "Build · Android"
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android build
        uses: actions/cache@v5
        with:
          path: |
            android/app/build
            android/build
          key: ${{ runner.os }}-android-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-android-build-

      - name: Build Application
        run: eas build --profile preview --platform android --non-interactive --local

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build-*.apk
          retention-days: 3
