name: Build React Native App

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: "temurin" # See 'Supported distributions' for available options
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Cache Expo
        uses: actions/cache@v4
        with:
          path: |
            ~/.expo
            ~/.eas
          key: ${{ runner.os }}-expo-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Application
        if: |
          github.ref == 'refs/heads/main' ||
          contains(join(github.event.pull_request.changed_files, ','), 'android/')
        run: eas build --profile preview --platform android --non-interactive --local

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build-*.apk
          retention-days: 3

  android-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Cache Android build
        uses: actions/cache@v4
        with:
          path: |
            android/app/build
            android/build
          key: ${{ runner.os }}-android-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-android-build-
      - name: Build Application
        if: |
          github.ref == 'refs/heads/main' ||
          contains(join(github.event.pull_request.changed_files, ','), 'android/')
        run: eas build --profile preview --platform android --non-interactive --local --clear-cache=false
