name: Setup Environment

description: Common setup for Node, Java, Expo/EAS and dependencies

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "20"
        cache: "npm"

    - name: Setup Expo & EAS
      uses: expo/expo-github-action@v8
      with:
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}

    - name: Cache Expo
      uses: actions/cache@v4
      with:
        path: |
          ~/.expo
          ~/.eas
        key: ${{ runner.os }}-expo-${{ hashFiles('package.json') }}
        restore-keys: |
          ${{ runner.os }}-expo-

    - name: Install dependencies
      run: npm ci
      shell: bash